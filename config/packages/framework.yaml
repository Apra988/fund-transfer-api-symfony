# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    # Writes: fixed window per client IP stored in Redis (see cache pool rate_limiter.transfer_write).
    rate_limiter:
        transfer_write:
            policy: fixed_window
            limit: '%env(int:TRANSFER_WRITE_RATE_LIMIT)%'
            interval: '1 minute'
            cache_pool: rate_limiter.transfer_write

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
        # Hard cap for integration tests (429 assertions). Production-like defaults use .env instead.
        rate_limiter:
            transfer_write:
                limit: 35
